---
name: Feature Request
description: >-
  Suggest a new feature or enhancement
  for spectrik
title: '[Feature]: '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: >
        Thanks for suggesting a new feature! Please
        fill out the sections below to help us
        understand your idea.

  - type: textarea
    id: description
    attributes:
      label: What would you like to see?
      description: >-
        Provide a clear and concise description
        of the feature you'd like to see.
      placeholder: >
        Example: I would like Specification.remove()
        to have a default implementation so
        irreversible specs don't need to stub it out.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: >-
        Explain the problem or need this feature
        would address. Help us understand why this
        is important.
      placeholder: >
        Example: Many specs represent irreversible
        resources (e.g. setting a hostname) where
        remove() doesn't make sense. Currently I
        have to implement remove() and raise
        NotImplementedError, which is boilerplate
        that fails at runtime instead of being
        caught earlier.
    validations:
      required: true

  - type: textarea
    id: desired-behavior
    attributes:
      label: Describe the desired behavior
      description: >
        Walk us through a concrete scenario showing
        how this feature would work. Include expected
        inputs, outputs, and any relevant state
        changes.
      placeholder: |
        Example:
        1. Define a spec without implementing remove()
        2. The default remove() raises NotImplementedError
        3. The Absent strategy detects this and warns
        4. Specs that can be removed override remove()
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Have you tried any workarounds?
      description: >-
        Are there any current workarounds you're
        using? What other solutions have you
        considered?
      placeholder: >
        Example: I currently implement remove() in
        every spec and raise NotImplementedError
        manually.

  - type: textarea
    id: examples
    attributes:
      label: Examples or References
      description: >
        Are there any other tools or projects that
        do something similar? Feel free to share
        links or examples.
      placeholder: >
        Example: Terraform resources can set
        lifecycle { prevent_destroy = true } to
        disallow removal.

  - type: dropdown
    id: component
    attributes:
      label: Which component is this related to?
      description: >-
        Select the area of the system most relevant
        to this feature.
      options:
        - Specification
        - SpecOp / Strategies
        - Blueprint
        - Project
        - Context
        - Workspace
        - HCL Pipeline
        - Spec Registry
        - Variable Resolver
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: >
        Add any other technical context, design
        ideas, or considerations about this feature
        request.
      placeholder: >-
        Any additional information that might
        be helpful.
